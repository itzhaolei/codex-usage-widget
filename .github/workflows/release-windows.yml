name: Release Windows package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Parse PowerShell and WPF XAML
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "windows/QuotaBubble.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }
          Add-Type -AssemblyName PresentationFramework
          $source = Get-Content "windows/QuotaBubble.ps1" -Raw
          $match = [regex]::Match($source, '(?s)\$xaml = @"\r?\n(.*?)\r?\n"@')
          if (-not $match.Success) { throw "WPF XAML block not found" }
          $reader = [System.Xml.XmlNodeReader]::new([xml]$match.Groups[1].Value)
          $window = [Windows.Markup.XamlReader]::Load($reader)
          if ($window.Width -ne 330) { throw "Unexpected window width" }
          $window.Close()

      - name: Run shared tests
        shell: bash
        run: |
          node tests/WindowsStaticTests.mjs
          node tests/SnapshotFallbackTests.mjs
          node --check scripts/codex-usage-snapshot.mjs

      - name: Smoke launch Windows widget
        shell: pwsh
        run: |
          $smokeHome = Join-Path $env:RUNNER_TEMP "quota-bubble-smoke"
          New-Item -ItemType Directory -Path $smokeHome -Force | Out-Null
          $env:CODEX_HOME = $smokeHome
          $stdout = Join-Path $smokeHome "stdout.log"
          $stderr = Join-Path $smokeHome "stderr.log"
          $process = Start-Process powershell.exe -ArgumentList @(
            "-NoProfile", "-ExecutionPolicy", "Bypass", "-STA",
            "-File", (Resolve-Path "windows/QuotaBubble.ps1"), "-NoSingleInstance"
          ) -PassThru -RedirectStandardOutput $stdout -RedirectStandardError $stderr
          Start-Sleep -Seconds 5
          if ($process.HasExited) {
            $details = (Get-Content $stderr -Raw -ErrorAction SilentlyContinue)
            throw "Quota Bubble exited during smoke launch. $details"
          }
          Stop-Process -Id $process.Id -Force

      - name: Build Windows package
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then VERSION="${GITHUB_REF_NAME#v}"; fi
          bash scripts/package-windows.sh "$VERSION"

      - name: Verify packaged Windows payload
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if (-not $version) { $version = $env:GITHUB_REF_NAME.TrimStart('v') }
          $archive = "dist/QuotaBubble-$version-Windows.zip"
          $output = Join-Path $env:RUNNER_TEMP "quota-bubble-package"
          Expand-Archive -Path $archive -DestinationPath $output -Force
          $root = Join-Path $output "QuotaBubble-$version"
          if ((Get-Content (Join-Path $root "VERSION") -Raw).Trim() -ne $version) { throw "Packaged version mismatch" }
          foreach ($relative in @("windows/QuotaBubble.ps1", "windows/install.ps1", "windows/uninstall.ps1", "scripts/codex-usage-snapshot.mjs")) {
            if (-not (Test-Path (Join-Path $root $relative))) { throw "Missing packaged file: $relative" }
          }

      - name: Upload package to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ inputs.version }}"
          if (-not $version) { $version = $env:GITHUB_REF_NAME.TrimStart('v') }
          $tag = "v$version"
          $asset = "dist/QuotaBubble-$version-Windows.zip"
          for ($attempt = 0; $attempt -lt 30; $attempt++) {
            gh release view $tag *> $null
            if ($LASTEXITCODE -eq 0) { break }
            Start-Sleep -Seconds 2
          }
          gh release upload $tag $asset --clobber
