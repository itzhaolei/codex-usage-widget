name: Release Windows installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix
        required: true
      validate_only:
        description: Build and test without uploading a release asset
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve version
        shell: pwsh
        run: |
          $version = "$env:VERSION".TrimStart('v')
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run Windows static tests
        shell: bash
        run: |
          node tests/WindowsStaticTests.mjs

      - name: Build native Windows application
        shell: pwsh
        run: dotnet build windows/QuotaBubble/QuotaBubble.csproj --configuration Release -p:Version=$env:VERSION

      - name: Install packaging tools
        shell: pwsh
        run: |
          if (-not (Get-Command magick -ErrorAction SilentlyContinue)) {
            choco install imagemagick --no-progress -y
          }
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            choco install innosetup --no-progress -y
          }

      - name: Generate Windows application icon
        shell: pwsh
        run: magick assets/icon.png -define icon:auto-resize=256,128,64,48,32,16 windows/QuotaBubble.ico

      - name: Publish self-contained Windows application
        shell: pwsh
        run: |
          dotnet publish windows/QuotaBubble/QuotaBubble.csproj `
            --configuration Release --runtime win-x64 --self-contained true `
            -p:Version=$env:VERSION -p:PublishSingleFile=true `
            --output windows/publish
          if (-not (Test-Path windows/publish/QuotaBubble.exe)) { throw "QuotaBubble.exe was not published" }

      - name: Smoke launch native application
        shell: pwsh
        run: |
          $smokeHome = Join-Path $env:RUNNER_TEMP "quota-bubble-native-smoke"
          New-Item -ItemType Directory -Path $smokeHome -Force | Out-Null
          $env:CODEX_HOME = $smokeHome
          $process = Start-Process windows/publish/QuotaBubble.exe -PassThru
          Start-Sleep -Seconds 5
          if ($process.HasExited) { throw "Native Quota Bubble exited during smoke launch" }
          Stop-Process -Id $process.Id -Force

      - name: Build graphical installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$env:VERSION" `
            "/DPublishDir=$((Resolve-Path windows/publish).Path)" `
            windows/installer.iss
          $installer = "dist/QuotaBubble-$env:VERSION-Windows-Setup.exe"
          if (-not (Test-Path $installer)) { throw "Graphical installer was not created" }

      - name: Build legacy updater bridge
        shell: pwsh
        run: |
          $bridge = Join-Path $env:RUNNER_TEMP "QuotaBubble-$env:VERSION"
          New-Item -ItemType Directory -Path $bridge -Force | Out-Null
          Copy-Item windows/compat/install.ps1 (Join-Path $bridge "install.ps1")
          Copy-Item "dist/QuotaBubble-$env:VERSION-Windows-Setup.exe" $bridge
          Compress-Archive -Path $bridge -DestinationPath "dist/QuotaBubble-$env:VERSION-Windows.zip" -Force
          if (-not (Test-Path "dist/QuotaBubble-$env:VERSION-Windows.zip")) { throw "Legacy updater bridge was not created" }

      - name: Install graphical package silently
        shell: pwsh
        run: |
          $installer = (Resolve-Path "dist/QuotaBubble-$env:VERSION-Windows-Setup.exe").Path
          $installDir = Join-Path $env:RUNNER_TEMP "Quota Bubble Installed"
          $arguments = "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=`"$installDir`" /MERGETASKS=`"!startup,!desktopicon`""
          $process = Start-Process $installer -ArgumentList $arguments -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Installer exited with $($process.ExitCode)" }
          if (-not (Test-Path (Join-Path $installDir "QuotaBubble.exe"))) { throw "Installed application is missing" }
          "INSTALL_DIR=$installDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Smoke launch installed application
        shell: pwsh
        run: |
          $process = Start-Process (Join-Path $env:INSTALL_DIR "QuotaBubble.exe") -PassThru
          Start-Sleep -Seconds 5
          if ($process.HasExited) { throw "Installed Quota Bubble exited during smoke launch" }
          Stop-Process -Id $process.Id -Force
          $uninstaller = Join-Path $env:INSTALL_DIR "unins000.exe"
          $result = Start-Process $uninstaller -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait -PassThru
          if ($result.ExitCode -ne 0) { throw "Uninstaller exited with $($result.ExitCode)" }

      - name: Upload installer to GitHub Release
        if: github.event_name == 'push' || inputs.validate_only == false
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v$env:VERSION"
          $asset = "dist/QuotaBubble-$env:VERSION-Windows-Setup.exe"
          $bridge = "dist/QuotaBubble-$env:VERSION-Windows.zip"
          for ($attempt = 0; $attempt -lt 60; $attempt++) {
            gh release view $tag *> $null
            if ($LASTEXITCODE -eq 0) { break }
            Start-Sleep -Seconds 2
          }
          gh release upload $tag $asset $bridge --clobber
