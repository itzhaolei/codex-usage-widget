name: Release macOS installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Select Liquid Glass toolchain
        run: |
          sudo xcode-select -s /Applications/Xcode_26.6.app
          xcodebuild -version
          swiftc --version

      - name: Build universal installer
        env:
          QUOTA_BUBBLE_UNIVERSAL: "1"
          QUOTA_BUBBLE_REQUIRE_LIQUID_GLASS: "1"
        run: |
          VERSION="${VERSION#v}"
          bash scripts/package-installer.sh "$VERSION"
          file "dist/QuotaBubble-$VERSION-macOS-Installer.zip"
          shasum -a 256 "dist/QuotaBubble-$VERSION-macOS-Installer.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${VERSION#v}"
          TAG="v$VERSION"
          ASSET="dist/QuotaBubble-$VERSION-macOS-Installer.zip"
          NOTES="docs/releases/$VERSION.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
          elif [ -f "$NOTES" ]; then
            gh release create "$TAG" "$ASSET" --title "Quota Bubble $TAG" --notes-file "$NOTES" --verify-tag
          else
            gh release create "$TAG" "$ASSET" --title "Quota Bubble $TAG" --generate-notes --verify-tag
          fi
